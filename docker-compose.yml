services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cv_builder
      POSTGRES_USER: cv_user
      POSTGRES_PASSWORD: cv_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://cv_user:cv_password@db:5432/cv_builder
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    ports:
      - "8000:3000"

volumes:
  postgres_data:
